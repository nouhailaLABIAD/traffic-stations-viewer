services:

  mongodb:
    image: mongo:6
    restart: always
    volumes:
      - ./dataset:/dataset
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb

  web:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./dataset:/dataset
    depends_on:
      - mongodb

volumes:
  mongo-data: