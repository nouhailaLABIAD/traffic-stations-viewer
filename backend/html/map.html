{{ifEmpty}}
<div class="card">
  <div class="empty">
    <div class="icon">🗺️</div>
    <div>Aucune station à afficher.<br/>Veuillez d'abord <a href="/import">importer les données</a>.</div>
  </div>
</div>
{{else}}
<div class="card" style="padding:0; overflow:hidden;">
  <div id="map" style="height:600px; width:100%;"></div>
</div>
<script>
  // Initialisation de la carte
  const map = L.map('map').setView([34.0, -118.2], 9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  // Charger les stations depuis l'API
  fetch('/api/stations')
    .then(response => response.json())
    .then(stations => {
      stations.forEach(s => {
        const lat = parseFloat(s.Latitude);
        const lon = parseFloat(s.Longitude);
        if (isNaN(lat) || isNaN(lon)) return;
        L.circleMarker([lat, lon], {
          radius: 5,
          color: '#dc3545',
          fillColor: '#dc3545',
          fillOpacity: 0.8,
          weight: 1
        }).addTo(map).bindPopup(`
          <b>Station ID:</b> ${s.ID}<br>
          <b>Fwy:</b> ${s.Fwy} ${s.Dir}<br>
          <b>District:</b> ${s.District}<br>
          <b>Coords:</b> ${lat.toFixed(4)}, ${lon.toFixed(4)}<br>
          <a href="https://www.waze.com/ul?ll=${lat},${lon}&navigate=yes" target="_blank">
            ➡️ Naviguer avec Waze
          </a>
        `);
      });
    })
    .catch(err => console.error('Erreur chargement stations:', err));
</script>
{{end}}
